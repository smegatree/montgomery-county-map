<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Montgomery County PA - School Districts & Environmental Analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
.info { padding: 10px; font: 14px/16px Arial, sans-serif; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; max-width: 300px; }
.info h4 { margin: 0 0 5px; color: #777; }
.legend { line-height: 24px; color: #555; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
.legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }
.layer-control { 
  position: absolute; 
  top: 10px; 
  right: 10px; 
  background: white; 
  padding: 12px; 
  border-radius: 5px; 
  box-shadow: 0 0 15px rgba(0,0,0,0.2); 
  z-index: 1000; 
  max-height: 85vh; 
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  max-width: 320px;
}
.layer-control label { 
  display: block; 
  margin: 10px 0; 
  cursor: pointer;
  -webkit-tap-highlight-color: rgba(0,0,0,0.1);
  padding: 5px;
}
.layer-control input { 
  margin-right: 8px;
  width: 18px;
  height: 18px;
  cursor: pointer;
}
.layer-control h3 { 
  margin: 15px 0 8px 0; 
  font-size: 14px; 
  border-bottom: 1px solid #ccc; 
  padding-bottom: 5px; 
}
.layer-control-content { 
  display: block; 
  margin-top: 10px;
}
.layer-control-content.collapsed { 
  display: none; 
}
.toggle-btn { 
  background: #378ADD; 
  color: white; 
  border: none; 
  padding: 12px 16px; 
  border-radius: 5px; 
  cursor: pointer; 
  font-size: 15px; 
  font-weight: bold; 
  width: 100%; 
  -webkit-appearance: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  display: block;
}
.toggle-btn:active { 
  background: #2a6bb5; 
  transform: scale(0.98);
}
.toggle-btn:hover {
  background: #2a6bb5;
}

@media (max-width: 768px) {
  .layer-control { 
    top: 10px; 
    right: 10px; 
    left: 10px; 
    max-width: none;
  }
  .layer-control h2 { 
    font-size: 15px; 
  }
  .layer-control label {
    padding: 8px 5px;
  }
  .layer-control input {
    width: 20px;
    height: 20px;
  }
}
</style>
</head>
<body>
<div id="map"></div>

<div class="layer-control" id="layerControl">
<button class="toggle-btn" ontouchstart="toggleLegend(); return false;" onclick="toggleLegend(); return false;">▼ Hide Layers</button>
<div class="layer-control-content" id="layerContent">
<h2 style="margin-top:0; font-size:16px;">Montgomery County Map Layers</h2>

<h3>School Districts</h3>
<label><input type="checkbox" id="tier1" checked> <strong>Tier 1 Elite</strong> (Purple)</label>
<label><input type="checkbox" id="tier2" checked> <strong>Tier 2 Strong</strong> (Teal)</label>
<label><input type="checkbox" id="tier3" checked> <strong>Tier 3 Solid</strong> (Blue)</label>

<h3>Environmental Hazards</h3>
<label><input type="checkbox" id="nuclear" checked> <strong>Nuclear Plant</strong> (15mi buffer)</label>
<label><input type="checkbox" id="superfund" checked> <strong>Superfund Sites</strong></label>
<label><input type="checkbox" id="waste" checked> <strong>Waste Facilities</strong></label>

<h3>Reference Points</h3>
<label><input type="checkbox" id="commute" checked> <strong>Work Locations</strong></label>
<label><input type="checkbox" id="targets" checked> <strong>Target Areas</strong> (Green)</label>

<div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #ccc; font-size: 12px; color: #666;">
<strong>Instructions:</strong><br>
• Click checkboxes to show/hide layers<br>
• Click school districts for details<br>
• Zoom with mouse wheel or +/- buttons
</div>
</div>
</div>

<script>
// Toggle function - must be global so button can call it
function toggleLegend() {
    const content = document.getElementById('layerContent');
    const button = document.querySelector('.toggle-btn');
    
    if (content.classList.contains('collapsed')) {
        content.classList.remove('collapsed');
        button.textContent = '▼ Hide Layers';
    } else {
        content.classList.add('collapsed');
        button.textContent = '☰ Show Layers';
    }
    
    return false;
}

// Wait for page and libraries to fully load
window.onload = function() {
// Initialize map centered on Montgomery County
const map = L.map('map').setView([40.1776, -75.2588], 10);

// Add OpenStreetMap tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 18
}).addTo(map);

// Color schemes
const colors = {
    tier1: '#7F77DD',  // Purple
    tier2: '#1D9E75',  // Teal
    tier3: '#378ADD',  // Blue
    nuclear: '#E24B4A', // Red
    superfund: '#F09595',
    waste: '#B4B2A9',
    target: '#97C459'  // Green
};

// Layer groups
const layers = {
    tier1: L.layerGroup().addTo(map),
    tier2: L.layerGroup().addTo(map),
    tier3: L.layerGroup().addTo(map),
    nuclear: L.layerGroup().addTo(map),
    superfund: L.layerGroup().addTo(map),
    waste: L.layerGroup().addTo(map),
    commute: L.layerGroup().addTo(map),
    targets: L.layerGroup().addTo(map)
};

// School District Boundaries (approximate - these would need actual GIS data for precision)
// Tier 1 Elite Schools
const lowerMerion = L.polygon([
    [40.0095, -75.2913], [40.0095, -75.2313], [39.9695, -75.2313], [39.9695, -75.2913]
], {
    color: colors.tier1,
    fillColor: colors.tier1,
    fillOpacity: 0.3,
    weight: 2
}).bindPopup('<strong>Lower Merion School District</strong><br>Rank: #3 in PA<br>High School: #11 statewide<br>Area: Ardmore, Wynnewood<br><em>35-45 min to Harleysville</em>').addTo(layers.tier1);

const wissahickon = L.polygon([
    [40.1847, -75.2514], [40.1847, -75.1814], [40.1147, -75.1814], [40.1147, -75.2514]
], {
    color: colors.tier1,
    fillColor: colors.tier1,
    fillOpacity: 0.3,
    weight: 2
}).bindPopup('<strong>Wissahickon School District</strong><br>Rank: #15 in PA, #21 statewide<br>Area: Ambler, Lower Gwynedd<br><em>25-30 min to Harleysville</em><br><span style="color:#3B6D11"><strong>✓ RECOMMENDED</strong></span>').addTo(layers.tier1);

const upperDublin = L.polygon([
    [40.1742, -75.2156], [40.1742, -75.1456], [40.1042, -75.1456], [40.1042, -75.2156]
], {
    color: colors.tier1,
    fillColor: colors.tier1,
    fillOpacity: 0.3,
    weight: 2
}).bindPopup('<strong>Upper Dublin School District</strong><br>Rank: #21 in PA, #39 statewide<br>Area: Fort Washington, Dresher<br><em>25-30 min to Harleysville</em><br><span style="color:#3B6D11"><strong>✓ RECOMMENDED</strong></span>').addTo(layers.tier1);

// Tier 2 Strong Schools
const plymouthWhitemarsh = L.polygon([
    [40.1167, -75.3247], [40.1167, -75.2547], [40.0467, -75.2547], [40.0467, -75.3247]
], {
    color: colors.tier2,
    fillColor: colors.tier2,
    fillOpacity: 0.3,
    weight: 2
}).bindPopup('<strong>Plymouth-Whitemarsh School District</strong><br>Rank: #24 statewide<br>Area: Plymouth Meeting').addTo(layers.tier2);

const lowerMoreland = L.polygon([
    [40.1592, -75.0958], [40.1592, -75.0258], [40.0892, -75.0258], [40.0892, -75.0958]
], {
    color: colors.tier2,
    fillColor: colors.tier2,
    fillOpacity: 0.3,
    weight: 2
}).bindPopup('<strong>Lower Moreland School District</strong><br>Rank: #27 statewide<br>Eastern Montgomery County').addTo(layers.tier2);

const springFord = L.polygon([
    [40.2136, -75.5647], [40.2136, -75.4947], [40.1436, -75.4947], [40.1436, -75.5647]
], {
    color: colors.tier2,
    fillColor: colors.tier2,
    fillOpacity: 0.3,
    weight: 2
}).bindPopup('<strong>Spring-Ford School District</strong><br>Rank: #36 statewide<br>Area: Royersford<br><em style="color:#A32D2D">Near Limerick - check distance</em>').addTo(layers.tier2);

const perkiomenValley = L.polygon([
    [40.2464, -75.5192], [40.2464, -75.4492], [40.1764, -75.4492], [40.1764, -75.5192]
], {
    color: colors.tier2,
    fillColor: colors.tier2,
    fillOpacity: 0.3,
    weight: 2
}).bindPopup('<strong>Perkiomen Valley School District</strong><br>Rank: #41 statewide<br><em style="color:#A32D2D">Near Limerick buffer edge</em>').addTo(layers.tier2);

// Tier 3 Solid Schools
const northPenn = L.polygon([
    [40.2714, -75.3139], [40.2714, -75.2439], [40.2014, -75.2439], [40.2014, -75.3139]
], {
    color: colors.tier3,
    fillColor: colors.tier3,
    fillOpacity: 0.3,
    weight: 2
}).bindPopup('<strong>North Penn School District</strong><br>Large district, solid performance<br>Area: Lansdale, Montgomery Township').addTo(layers.tier3);

const hatboroHorsham = L.polygon([
    [40.2036, -75.1464], [40.2036, -75.0764], [40.1336, -75.0764], [40.1336, -75.1464]
], {
    color: colors.tier3,
    fillColor: colors.tier3,
    fillOpacity: 0.3,
    weight: 2
}).bindPopup('<strong>Hatboro-Horsham School District</strong><br>Solid academics, affordable<br>New construction available').addTo(layers.tier3);

// Nuclear Plant with 15-mile buffer
const limerick = L.circle([40.2274, -75.5832], {
    color: colors.nuclear,
    fillColor: colors.nuclear,
    fillOpacity: 0.15,
    radius: 24140  // 15 miles in meters
}).bindPopup('<strong>Limerick Generating Station</strong><br>Nuclear Power Plant<br><strong>15-mile safety buffer shown</strong><br>Stay outside this circle').addTo(layers.nuclear);

L.marker([40.2274, -75.5832]).bindPopup('<strong>Limerick Nuclear Plant</strong><br>2,300 MW facility<br>Cooling towers visible within 10 miles').addTo(layers.nuclear);

// Superfund Sites
L.marker([40.2856, -75.3947]).bindPopup('<strong>Baghurst Drive Superfund</strong><br>Location: Near Harleysville<br>Issue: VOC groundwater contamination<br>Status: Active cleanup').addTo(layers.superfund);

L.marker([40.1547, -75.2114]).bindPopup('<strong>BoRit Asbestos Superfund</strong><br>Location: Ambler<br>Issue: Asbestos waste disposal<br>Status: Capped and monitored').addTo(layers.superfund);

L.marker([40.2414, -75.2839]).bindPopup('<strong>North Penn Area 6 Superfund</strong><br>Location: Lansdale<br>Issue: Groundwater contamination<br>Status: Active monitoring').addTo(layers.superfund);

L.marker([40.2656, -75.4014]).bindPopup('<strong>Salford Quarry Superfund</strong><br>Location: Lower Salford<br>Issue: Buried waste<br>Status: Barrier construction underway').addTo(layers.superfund);

// Waste Facilities
L.marker([40.2723, -75.6699]).bindPopup('<strong>Pottstown Landfill</strong><br>Active waste facility').addTo(layers.waste);

L.marker([40.2908, -75.3541]).bindPopup('<strong>Mascaro Souderton Transfer Station</strong><br>Capacity: 800 tons/day<br>Franconia Township').addTo(layers.waste);

L.marker([40.0945, -75.3176]).bindPopup('<strong>Conshohocken Transfer Station</strong><br>Recycling & rail transfer').addTo(layers.waste);

// Work Commute Points
L.marker([40.2795, -75.3871], {
    icon: L.divIcon({className: 'commute-marker', html: '🏢', iconSize: [30, 30]})
}).bindPopup('<strong>Harleysville</strong><br>Primary work location<br>Target: ≤30 min commute').addTo(layers.commute);

L.marker([39.7447, -75.5484], {
    icon: L.divIcon({className: 'commute-marker', html: '🏢', iconSize: [30, 30]})
}).bindPopup('<strong>Wilmington, DE</strong><br>Secondary work location<br>Target: ≤60 min commute').addTo(layers.commute);

// Target Areas (Green zones)
L.circle([40.1364, -75.1956], {
    color: colors.target,
    fillColor: colors.target,
    fillOpacity: 0.4,
    radius: 3000
}).bindPopup('<strong>Fort Washington / Dresher</strong><br><span style="color:#3B6D11"><strong>✓ TARGET AREA #1</strong></span><br>• Upper Dublin Schools<br>• 25-30 min to Harleysville<br>• New construction available<br>• ~20 miles from Limerick').addTo(layers.targets);

L.circle([40.1781, -75.2564], {
    color: colors.target,
    fillColor: colors.target,
    fillOpacity: 0.4,
    radius: 3000
}).bindPopup('<strong>Lower Gwynedd / Spring House</strong><br><span style="color:#3B6D11"><strong>✓ TARGET AREA #2</strong></span><br>• Wissahickon Schools<br>• 25-30 min to Harleysville<br>• Larger lot sizes available<br>• ~18 miles from Limerick').addTo(layers.targets);

L.circle([40.1823, -75.1168], {
    color: colors.target,
    fillColor: colors.target,
    fillOpacity: 0.3,
    radius: 2500
}).bindPopup('<strong>Horsham</strong><br><span style="color:#639922"><strong>Option #3</strong></span><br>• Hatboro-Horsham Schools (Tier 3)<br>• 20-25 min to Harleysville<br>• Most new construction inventory<br>• More affordable ($500-700k)').addTo(layers.targets);

document.getElementById('tier1').addEventListener('change', (e) => {
    e.target.checked ? map.addLayer(layers.tier1) : map.removeLayer(layers.tier1);
});
document.getElementById('tier2').addEventListener('change', (e) => {
    e.target.checked ? map.addLayer(layers.tier2) : map.removeLayer(layers.tier2);
});
document.getElementById('tier3').addEventListener('change', (e) => {
    e.target.checked ? map.addLayer(layers.tier3) : map.removeLayer(layers.tier3);
});
document.getElementById('nuclear').addEventListener('change', (e) => {
    e.target.checked ? map.addLayer(layers.nuclear) : map.removeLayer(layers.nuclear);
});
document.getElementById('superfund').addEventListener('change', (e) => {
    e.target.checked ? map.addLayer(layers.superfund) : map.removeLayer(layers.superfund);
});
document.getElementById('waste').addEventListener('change', (e) => {
    e.target.checked ? map.addLayer(layers.waste) : map.removeLayer(layers.waste);
});
document.getElementById('commute').addEventListener('change', (e) => {
    e.target.checked ? map.addLayer(layers.commute) : map.removeLayer(layers.commute);
});
document.getElementById('targets').addEventListener('change', (e) => {
    e.target.checked ? map.addLayer(layers.targets) : map.removeLayer(layers.targets);
});

// Add scale
L.control.scale({imperial: true, metric: false}).addTo(map);

}; // End window.onload
</script>
</body>
</html>
