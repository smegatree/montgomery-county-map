<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SE Pennsylvania Regional Map - School Districts & Environmental Analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
.layer-control { 
  position: absolute; 
  top: 10px; 
  right: 10px; 
  background: white; 
  padding: 12px; 
  border-radius: 5px; 
  box-shadow: 0 0 15px rgba(0,0,0,0.2); 
  z-index: 1000; 
  max-height: 85vh; 
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  max-width: 320px;
}
.layer-control label { 
  display: block; 
  margin: 10px 0; 
  cursor: pointer;
  -webkit-tap-highlight-color: rgba(0,0,0,0.1);
  padding: 5px;
}
.layer-control label:hover { background: #f9f9f9; }
.layer-control input { 
  margin-right: 8px;
  width: 18px;
  height: 18px;
  cursor: pointer;
}
.layer-control h3 { 
  margin: 15px 0 8px 0; 
  font-size: 14px; 
  border-bottom: 1px solid #ccc; 
  padding-bottom: 5px; 
}
.layer-control-content { 
  display: block; 
  margin-top: 10px;
}
.layer-control-content.collapsed { 
  display: none; 
}
.toggle-btn { 
  background: #378ADD; 
  color: white; 
  border: none; 
  padding: 12px 16px; 
  border-radius: 5px; 
  cursor: pointer; 
  font-size: 15px; 
  font-weight: bold; 
  width: 100%; 
  -webkit-appearance: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  display: block;
}
.toggle-btn:active { 
  background: #2a6bb5; 
  transform: scale(0.98);
}
.toggle-btn:hover {
  background: #2a6bb5;
}

@media (max-width: 768px) {
  .layer-control { 
    top: 10px; 
    right: 10px; 
    left: 10px; 
    max-width: none;
  }
  .layer-control h2 { 
    font-size: 15px; 
  }
  .layer-control label {
    padding: 8px 5px;
  }
  .layer-control input {
    width: 20px;
    height: 20px;
  }
}
</style>
</head>

<div id="map"></div>

<div class="layer-control-content" id="layerContent">
<h2 style="margin-top:0; font-size:16px;">SE PA Regional Map</h2>

<h3>School Districts by Tier</h3>
<label><input type="checkbox" id="tier1" checked> <strong>Tier 1 Elite</strong> (Purple) - Top 5%</label>

<label><input type="checkbox" id="tier3" checked> <strong>Tier 3 Solid</strong> (Blue)</label>

<h3>Commute Zones</h3>
<label><input type="checkbox" id="zone_ideal" checked> <strong>Ideal Zone</strong> (Green) - Meets both rules</label>
<label><input type="checkbox" id="zone_stretch" checked> <strong>Stretch Zone</strong> (Yellow) - Close to limits</label>
<label><input type="checkbox" id="zone_outside" checked> <strong>Outside Rules</strong> (Orange) - Worth seeing</label>

<h3>Environmental Hazards</h3>
<label><input type="checkbox" id="nuclear" checked> <strong>Nuclear Plant</strong> (15mi buffer)</label>
<label><input type="checkbox" id="superfund" checked> <strong>Superfund Sites</strong></label>
<label><input type="checkbox" id="waste" checked> <strong>Waste Facilities</strong></label>

<h3>Reference Points</h3>
<label><input type="checkbox" id="commute" checked> <strong>Work Locations</strong></label>
<label><input type="checkbox" id="highways" checked> <strong>Major Highways</strong></label>

<div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #ccc; font-size: 12px; color: #666;">
<strong>Legend:</strong><br>
• Green = ≤30min Harleysville + ≤60min Wilmington<br>
• Yellow = Slightly over one rule<br>
• Orange = Outside rules but quality schools<br>
<br>
<strong>Coverage:</strong> Montgomery, Delaware, Chester, Bucks Counties
</div>
</div>
</div>

// Toggle function - must be global so button can call it
function toggleLegend() {
    const content = document.getElementById('layerContent');
    const button = document.querySelector('.toggle-btn');
    
    if (content.classList.contains('collapsed')) {
        content.classList.remove('collapsed');
        button.textContent = '▼ Hide Layers';
    } else {
        content.classList.add('collapsed');
        button.textContent = '☰ Show Layers';
    }
    
    return false;
}
